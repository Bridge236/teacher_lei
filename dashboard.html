<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>别点我 - 班级管理</title>
<script src="storage.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#16a34a;--accent-hover:#15803d;--accent-dark:#166534;
  --accent-light:#dcfce7;--accent-glow:rgba(22,163,74,0.15);
  --bg:#f0fdf4;--bg-card:#ffffff;
  --border:rgba(22,163,74,0.15);
  --text:#1e293b;--text-sub:#64748b;
  --red:#ef4444;--red-light:#fef2f2;
  --shadow:0 4px 20px rgba(22,163,74,0.08);
  --radius:16px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);min-height:100vh;color:var(--text);
  overflow-x:hidden;
}

/* ===== 背景装饰 ===== */
.bg-animation{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;overflow:hidden;pointer-events:none;
}
.bg-animation .blob{
  position:absolute;border-radius:50%;
  filter:blur(70px);opacity:0.13;
  animation:blobFloat 28s infinite ease-in-out;
}
.bg-animation .blob:nth-child(1){
  width:420px;height:420px;background:#4ade80;
  top:-8%;left:-6%;animation-delay:0s;
}
.bg-animation .blob:nth-child(2){
  width:360px;height:360px;background:#34d399;
  top:55%;right:-8%;animation-delay:-9s;
}
.bg-animation .blob:nth-child(3){
  width:300px;height:300px;background:#86efac;
  bottom:-6%;left:28%;animation-delay:-17s;
}
@keyframes blobFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(28px,-38px) scale(1.08)}
  50%{transform:translate(-18px,22px) scale(0.93)}
  75%{transform:translate(14px,32px) scale(1.04)}
}
body::after{
  content:'';
  position:fixed;
  bottom:0;left:0;right:0;
  height:160px;
  background:linear-gradient(to top,
    rgba(52,211,153,0.15) 0%,
    rgba(134,178,106,0.12) 50%,
    transparent 100%);
  pointer-events:none;
  z-index:0;
}
body::before{
  content:'';
  position:fixed;
  bottom:0;left:0;right:0;
  height:60px;
  background:linear-gradient(to top,rgba(16,185,129,0.09),transparent);
  pointer-events:none;
  z-index:0;
}

#cursor-glow{display:none}
.nav{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  height:58px;display:flex;align-items:center;
  justify-content:space-between;padding:0 28px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.nav-brand{
  display:flex;align-items:center;gap:10px;
  cursor:pointer;text-decoration:none;
  transition:.2s;border-radius:10px;padding:4px 8px;
}
.nav-brand:hover{background:var(--accent-light)}
.nav-logo{
  width:44px;height:44px;border-radius:12px;
  object-fit:cover;object-position:35% 20%;
  background:#f8f9fa;
}
.nav-brand-text{display:flex;flex-direction:column;gap:1px}
.nav-title{
  font-size:16px;font-weight:800;
  background:linear-gradient(135deg,var(--accent),#059669);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:2px;line-height:1.2;
}
.nav-slogan{
  font-size:10px;color:var(--text-sub);letter-spacing:0.3px;
  font-weight:400;opacity:0.7;white-space:nowrap;
}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-user{
  font-size:12px;color:var(--text-sub);
  max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.btn-nav-to-roll{
  padding:5px 12px;border-radius:8px;
  border:1.5px solid rgba(22,163,74,0.25);background:rgba(22,163,74,0.07);
  color:var(--accent);font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:.2s;
}
.btn-nav-to-roll:hover{background:rgba(22,163,74,0.14);border-color:var(--accent)}
.btn-nav-logout{
  padding:5px 14px;border-radius:8px;
  border:1.5px solid var(--border);background:transparent;
  color:var(--text-sub);font-size:12px;font-weight:500;
  cursor:pointer;font-family:inherit;transition:.2s;
}
.btn-nav-logout:hover{border-color:var(--red);color:var(--red);background:var(--red-light)}

/* ===== LAYOUT ===== */
.container{max-width:980px;margin:0 auto;padding:32px 20px;position:relative;z-index:1}
.page{display:none}.page.active{display:block}

/* ===== PAGE HEADER ===== */
.page-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:28px;
}
.page-title{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-0.3px}
.page-sub{font-size:13px;color:var(--text-sub);margin-top:4px}

/* ===== BUTTONS ===== */
.btn{
  padding:10px 22px;border:none;border-radius:10px;
  font-size:14px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:.2s;display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{
  background:var(--accent);
  color:#fff;box-shadow:0 4px 14px rgba(22,163,74,0.25);
}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px)}
.btn-ghost{background:var(--bg-card);color:var(--accent);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--accent-light);border-color:var(--accent)}
.btn-danger-outline{background:transparent;color:var(--red);border:1.5px solid rgba(239,68,68,0.3)}
.btn-danger-outline:hover{background:var(--red-light);border-color:var(--red)}
.btn-sm{padding:6px 16px;font-size:13px;border-radius:8px;white-space:nowrap}

/* ===== CLASS GRID ===== */
.classes-layout{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start}
.class-grid{display:flex;flex-direction:column;gap:10px}

.class-row{
  background:var(--bg-card);border-radius:var(--radius);
  padding:18px 20px;border:1.5px solid var(--border);
  display:flex;align-items:center;gap:16px;cursor:pointer;
  transition:.2s;position:relative;overflow:hidden;
}
.class-row::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--accent),#8b5cf6);
  border-radius:4px 0 0 4px;opacity:0;transition:.2s;
}
.class-row:hover{border-color:rgba(99,102,241,0.3);transform:translateX(4px);box-shadow:var(--shadow)}
.class-row:hover::before{opacity:1}

.class-row-icon{
  width:44px;height:44px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent-light),#ede9fe);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
}
.class-row-info{flex:1;min-width:0}
.class-row-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.class-row-meta{font-size:12px;color:var(--text-sub)}
.class-row-arrow{color:var(--text-sub);font-size:16px;opacity:0;transition:.2s;flex-shrink:0}
.class-row:hover .class-row-arrow{opacity:1;transform:translateX(2px)}
.class-row-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{  
  height:30px;border-radius:8px;border:none;
  background:rgba(0,0,0,0.04);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:.2s;color:var(--text-sub);padding:0 10px;white-space:nowrap;
}
.icon-btn:hover{background:rgba(0,0,0,0.08)}
.icon-btn.del:hover{background:var(--red-light);color:var(--red)}
.icon-btn.star:hover{background:#fef9c3;color:#d97706}
.default-badge{
  display:inline-block;font-size:11px;font-weight:600;
  background:linear-gradient(135deg,#fef3c7,#fde68a);
  color:#92400e;padding:2px 8px;border-radius:20px;
  margin-left:6px;vertical-align:middle;
}

.class-empty{
  text-align:center;padding:48px 20px;color:var(--text-sub);
  background:var(--bg-card);border-radius:var(--radius);
  border:1.5px dashed var(--border);
}
.class-empty-icon{font-size:40px;margin-bottom:12px;opacity:0.5}
.class-empty-text{font-size:14px}

/* ===== ADD CLASS CARD ===== */
.add-class-panel{
  background:var(--bg-card);border-radius:var(--radius);
  border:1.5px solid var(--border);padding:24px;
  box-shadow:var(--shadow);position:sticky;top:78px;
}
.add-class-panel h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px}
.add-class-panel .sub{font-size:12px;color:var(--text-sub);margin-bottom:20px}
.field{margin-bottom:16px}
.field label{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px;display:block;letter-spacing:.3px;text-transform:uppercase}
.field input,.field textarea{
  width:100%;padding:10px 14px;border:1.5px solid var(--border);
  border-radius:10px;font-size:14px;background:#fff;
  outline:none;transition:.2s;font-family:inherit;color:var(--text);
}
.field input:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.field input.error{border-color:var(--red);box-shadow:0 0 0 3px rgba(239,68,68,0.1)}
.field-hint{font-size:11px;margin-top:5px}
.field-hint.error-msg{color:var(--red)}
.field-hint.ok-msg{color:#10b981}

/* ===== STUDENT DETAIL PAGE ===== */
.detail-layout{display:block}

.detail-main{background:var(--bg-card);border-radius:var(--radius);border:1.5px solid var(--border);overflow:hidden}
.detail-header{
  padding:18px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,rgba(99,102,241,0.04),rgba(139,92,246,0.04));
}
.detail-header-left{display:flex;align-items:center;gap:12px}
.back-btn{
  width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--bg-card);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-sub);transition:.2s;
}
.back-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.detail-class-name{font-size:18px;font-weight:800;color:var(--text)}
.detail-count-badge{
  font-size:12px;font-weight:600;
  background:var(--accent-light);color:var(--accent);
  padding:3px 10px;border-radius:20px;
}

/* ===== STUDENT TABLE ===== */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:rgba(99,102,241,0.03)}
th{
  text-align:left;padding:11px 16px;font-size:11px;
  color:var(--text-sub);font-weight:700;
  border-bottom:1.5px solid var(--border);
  text-transform:uppercase;letter-spacing:.5px;
}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid rgba(99,102,241,0.07);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(99,102,241,0.025)}
.stu-index{color:var(--text-sub);font-size:12px;font-weight:500}
.stu-name{font-weight:600;color:var(--text)}

.no-students{text-align:center;padding:48px 20px;color:var(--text-sub);font-size:14px}

/* ===== SIDEBAR PANELS ===== */
.detail-side{display:flex;flex-direction:column;gap:16px;position:sticky;top:78px}
.side-panel{
  background:var(--bg-card);border-radius:var(--radius);
  border:1.5px solid var(--border);padding:20px;
}
.side-panel-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.side-panel-sub{font-size:12px;color:var(--text-sub);margin-bottom:16px}
.add-row{display:flex;gap:8px;align-items:center}
.add-row input{
  flex:1;padding:9px 13px;border:1.5px solid var(--border);
  border-radius:10px;font-size:14px;font-family:inherit;
  outline:none;transition:.2s;color:var(--text);
}
.add-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.add-row .btn{padding:9px 16px;font-size:13px;border-radius:10px;white-space:nowrap}

.import-area{
  border:2px dashed var(--border);border-radius:10px;padding:16px;
  text-align:center;cursor:pointer;transition:.2s;
  color:var(--text-sub);font-size:13px;margin-bottom:10px;
}
.import-area:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(15,23,42,0.35);
  backdrop-filter:blur(4px);
  z-index:200;display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex}
.modal{
  background:#fff;border-radius:20px;padding:32px;
  width:100%;max-width:460px;
  box-shadow:0 24px 60px rgba(0,0,0,0.18);
  animation:modalIn .2s ease-out;
}
@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(8px)}to{opacity:1;transform:none}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-size:18px;font-weight:800;color:var(--text)}
.modal-close{
  width:28px;height:28px;border-radius:7px;border:none;
  background:rgba(0,0,0,0.05);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:.2s;
}
.modal-close:hover{background:rgba(0,0,0,0.1)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.modal textarea{
  width:100%;height:180px;border:1.5px solid var(--border);border-radius:10px;
  padding:12px;font-size:14px;font-family:inherit;outline:none;resize:vertical;
  transition:.2s;
}
.modal textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.modal-hint{font-size:12px;color:var(--text-sub);margin-top:8px}

/* ===== TOAST ===== */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;
  padding:11px 24px;border-radius:12px;font-size:14px;font-weight:500;color:#fff;
  pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,0.12);
}
.toast.show{opacity:1}
.toast-success{background:var(--accent)}
.toast-error{background:var(--red)}

/* ===== LIST LOADING ===== */
.list-loading{
  display:flex;align-items:center;justify-content:center;
  padding:32px 0;
}
.mini-spinner{
  width:22px;height:22px;
  border:2.5px solid var(--accent-light);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .7s linear infinite;
}

/* ===== LOADING ===== */
.loading-mask{
  position:fixed;inset:0;background:rgba(240,244,255,.8);
  z-index:998;display:flex;align-items:center;justify-content:center;
}
.spinner{
  width:36px;height:36px;border:3px solid var(--accent-light);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== CONFIRM DIALOG ===== */
.confirm-overlay{
  position:fixed;inset:0;background:rgba(15,23,42,0.35);
  backdrop-filter:blur(4px);z-index:300;
  display:none;align-items:center;justify-content:center;padding:20px;
}
.confirm-overlay.open{display:flex}
.confirm-box{
  background:#fff;border-radius:18px;padding:28px;
  width:100%;max-width:360px;
  box-shadow:0 24px 60px rgba(0,0,0,0.18);
  animation:modalIn .2s ease-out;text-align:center;
}
.confirm-icon{font-size:36px;margin-bottom:12px}
.confirm-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:8px}
.confirm-msg{font-size:13px;color:var(--text-sub);line-height:1.6;margin-bottom:24px}
.confirm-actions{display:flex;gap:10px;justify-content:center}

@media(max-width:768px){
  .classes-layout,.detail-layout{grid-template-columns:1fr}
  .add-class-panel,.detail-side{position:static}
  .nav-center{display:none}
  .nav{padding:0 16px}
}
</style>
</head>
<body>
<div class="bg-animation">
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
</div>

<!-- LOADING -->
<div class="loading-mask" id="loadingMask"><div class="spinner"></div></div>

<!-- NAV -->
<nav class="nav">
  <a class="nav-brand" onclick="location.href='roll.html'">
    <img src="logo.png" alt="" class="nav-logo" onerror="this.style.display='none'">
    <div class="nav-brand-text">
      <span class="nav-title">别点我</span>
      <span class="nav-slogan">大喊一声别点我，下一个点到的就是你！</span>
    </div>
  </a>
  <div class="nav-right">
    <span class="nav-user" id="navUser"></span>
    <button class="btn-nav-to-roll" onclick="location.href='roll.html'">去点名</button>
    <button class="btn-nav-logout" onclick="doLogout()">退出</button>
  </div>
</nav>
<div id="cursor-glow"></div>

<!-- MAIN -->
<div class="container">

  <!-- ===== 班级列表页 ===== -->
  <div class="page active" id="pageClasses">
    <div class="page-header">
      <div>
        <div class="page-title">我的班级</div>
        <div class="page-sub">点击班级行进入学生名单管理</div>
      </div>
    </div>

    <div class="classes-layout">
      <div>
        <div class="class-grid" id="classGrid"></div>
      </div>

      <div class="add-class-panel">
        <h3>➕ 新建班级</h3>
        <p class="sub">创建后可点击进入管理学生名单</p>
        <div class="field">
          <label>班级名称</label>
          <input id="newClassName" placeholder="如：高一(3)班 / 初二5班" maxlength="30"
            oninput="checkClassNameDup()" onkeydown="if(event.key==='Enter')saveNewClass()">
          <div class="field-hint" id="classNameHint"></div>
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="saveNewClass()">创建班级</button>
      </div>
    </div>
  </div>

  <!-- ===== 班级详情页 ===== -->
  <div class="page" id="pageStudents">
    <div class="detail-layout">
      <div class="detail-main">
        <div class="detail-header">
          <div class="detail-header-left">
            <button class="back-btn" onclick="backToClasses()" title="返回">←</button>
            <span class="detail-class-name" id="classNameLabel"></span>
            <span class="detail-count-badge" id="studentCountLabel"></span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <input id="newStuName" placeholder="输入学生姓名" maxlength="20"
              style="display:none;padding:7px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;outline:none;transition:.2s;width:160px"
              onfocus="this.style.borderColor='var(--accent)';this.style.boxShadow='0 0 0 3px var(--accent-glow)'"
              onblur="this.style.borderColor='var(--border)';this.style.boxShadow='none'">
            <button class="btn btn-primary btn-sm" onclick="addStudent()" style="display:none">+ 添加</button>
            <button class="btn btn-ghost btn-sm" onclick="openImport()">📥 批量导入</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:52px">#</th>
                <th>学生姓名</th>
                <th style="width:80px">操作</th>
              </tr>
            </thead>
            <tbody id="studentTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- 批量导入 MODAL -->
<div class="modal-overlay" id="modalImport" onclick="if(event.target===this)closeModal('modalImport')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">批量导入学生</span>
      <button class="modal-close" onclick="closeModal('modalImport')">✕</button>
    </div>
    <textarea id="importText" placeholder="支持从 Excel 整列复制粘贴：&#10;学生姓名请用换行、顿号或逗号分割，支持混合使用"></textarea>
    <div class="modal-hint">空行自动跳过，已存在的学生不会重复添加</div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modalImport')">取消</button>
      <button class="btn btn-primary btn-sm" onclick="doImport()">确认导入</button>
    </div>
  </div>
</div>

<!-- 自定义确认弹窗 -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon" id="confirmIcon">⚠️</div>
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="btn btn-ghost btn-sm" onclick="confirmResolve(false)">取消</button>
      <button class="btn btn-danger-outline btn-sm" onclick="confirmResolve(true)" id="confirmOkBtn">确认删除</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ====== STATE ======
var currentUserEmail = '';
var currentClassId = null;
var currentClassName = '';
var allClassNames = [];
var confirmResolve = null;
var currentStudents = [];

// ====== INIT ======
(function() {
  if (!BdwSession.requireLogin()) return;
  currentUserEmail = BdwSession.getUserEmail();
  document.getElementById('navUser').textContent = currentUserEmail;
  document.getElementById('loadingMask').style.display = 'none';
  loadClasses();
})();

// ====== PAGES ======
function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('page' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
}

// ====== LOGOUT ======
function doLogout() {
  BdwSession.logout();
}

// ====== CLASSES ======
function loadClasses() {
  var grid = document.getElementById('classGrid');
  grid.innerHTML = '<div class="list-loading"><div class="mini-spinner"></div></div>';
  var classes = BdwClasses.getAll();
  allClassNames = classes.map(function(c) { return c.name; });
  renderClasses(classes);
}

function renderClasses(classes) {
  var grid = document.getElementById('classGrid');
  if (classes.length === 0) {
    grid.innerHTML = '<div class="class-empty"><div class="class-empty-icon">🏫</div><div class="class-empty-text">还没有班级，在右侧创建第一个吧</div></div>';
    return;
  }
  var emojis = ['🚩','📚','✏️','🖊️','📖','🔬','🎨','🏆'];
  grid.innerHTML = classes.map(function(cls, idx) {
    return '<div class="class-row" onclick="openClass(\'' + cls.id + '\',\'' + esc(cls.name) + '\')">' +
      '<div class="class-row-icon">' + emojis[idx % emojis.length] + '</div>' +
      '<div class="class-row-info">' +
        '<div class="class-row-name">' + esc(cls.name) + (cls.is_default ? '<span class="default-badge">⭐ 默认</span>' : '') + '</div>' +
        '<div class="class-row-meta" id="meta_' + cls.id + '">' + (BdwStudents.count(cls.id) || 0) + ' 名学生</div>' +
      '</div>' +
      '<div class="class-row-actions" onclick="event.stopPropagation()">' +
        (cls.is_default ? '<span style="display:inline-block;width:44px"></span>' : '<button class="icon-btn star" onclick="setDefaultClass(\'' + cls.id + '\')" title="设为默认班级">☆</button>') +
        '<button class="icon-btn del" onclick="deleteClass(\'' + cls.id + '\',\'' + esc(cls.name) + '\')" title="删除班级">删除</button>' +
      '</div>' +
      '<span class="class-row-arrow">›</span>' +
    '</div>';
  }).join('');
}

function setDefaultClass(classId) {
  BdwClasses.setDefault(classId);
  showToast('默认班级已设置 ⭐', 'success');
  loadClasses();
}

// ====== 班级名重复检测 ======
function checkClassNameDup() {
  var val = document.getElementById('newClassName').value.trim();
  var hint = document.getElementById('classNameHint');
  var input = document.getElementById('newClassName');
  if (!val) { hint.textContent = ''; input.classList.remove('error'); return; }
  var dup = allClassNames.some(function(n) { return n === val; });
  if (dup) {
    hint.textContent = '⚠️ 该班级名称已存在';
    hint.className = 'field-hint error-msg';
    input.classList.add('error');
  } else {
    hint.textContent = '✓ 名称可用';
    hint.className = 'field-hint ok-msg';
    input.classList.remove('error');
  }
}

function saveNewClass() {
  var nameInput = document.getElementById('newClassName');
  var name = nameInput.value.trim();
  if (!name) { showToast('请输入班级名称', 'error'); nameInput.focus(); return; }
  if (allClassNames.some(function(n) { return n === name; })) {
    showToast('班级名称已存在，请换一个', 'error');
    nameInput.focus(); return;
  }
  BdwClasses.add(name);
  nameInput.value = '';
  document.getElementById('classNameHint').textContent = '';
  nameInput.classList.remove('error');
  showToast('班级创建成功 🎉');
  loadClasses();
}

function deleteClass(id, name) {
  showConfirm({
    icon: '🗑️',
    title: '删除班级「' + name + '」？',
    msg: '该班级所有学生和点名记录将被清除，此操作不可恢复。',
    okText: '确认删除'
  }).then(function(ok) {
    if (!ok) return;
    BdwClasses.remove(id);
    showToast('班级已删除');
    loadClasses();
  });
}

// ====== STUDENTS ======
function openClass(classId, className) {
  currentClassId = classId;
  currentClassName = className;
  document.getElementById('classNameLabel').textContent = className;
  showPage('students');
  loadStudents();
}

function backToClasses() {
  currentClassId = null;
  showPage('classes');
  loadClasses();
}

function loadStudents() {
  var tbody = document.getElementById('studentTbody');
  tbody.innerHTML = '<tr><td colspan="3"><div class="list-loading"><div class="mini-spinner"></div></div></td></tr>';
  var students = BdwStudents.getAll(currentClassId);
  document.getElementById('newStuName').style.display = 'inline-block';
  document.querySelector('#pageStudents .detail-header .btn-primary').style.display = 'inline-flex';
  renderStudents(students);
}

function renderStudents(students) {
  currentStudents = students;
  document.getElementById('studentCountLabel').textContent = '共 ' + students.length + ' 人';
  var tbody = document.getElementById('studentTbody');
  if (students.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3"><div class="no-students">暂无学生，在顶部添加或批量导入</div></td></tr>';
    return;
  }
  tbody.innerHTML = students.map(function(s, i) {
    return '<tr id="stu-row-' + s.id + '">' +
      '<td><span class="stu-index">' + (i + 1) + '</span></td>' +
      '<td id="stu-cell-' + s.id + '"><span class="stu-name">' + esc(s.name) + '</span></td>' +
      '<td><div style="display:flex;gap:6px">' +
        '<button class="btn btn-ghost btn-sm" id="stu-edit-btn-' + s.id + '" onclick="startEditStudent(\'' + s.id + '\',\'' + esc(s.name) + '\')">编辑</button>' +
        '<button class="btn btn-danger-outline btn-sm" id="stu-del-btn-' + s.id + '" onclick="deleteStudent(\'' + s.id + '\',\'' + esc(s.name) + '\')">删除</button>' +
      '</div></td>' +
    '</tr>';
  }).join('');
}

function startEditStudent(id, oldName) {
  var cell = document.getElementById('stu-cell-' + id);
  var editBtn = document.getElementById('stu-edit-btn-' + id);
  var delBtn = document.getElementById('stu-del-btn-' + id);
  cell.innerHTML = '<input id="stu-input-' + id + '" value="' + esc(oldName) + '" maxlength="20" style="padding:5px 10px;border:1.5px solid var(--accent);border-radius:8px;font-size:13px;font-family:inherit;outline:none;width:160px;box-shadow:0 0 0 3px var(--accent-glow)">';
  editBtn.textContent = '保存';
  editBtn.onclick = function() { saveEditStudent(id, oldName); };
  delBtn.textContent = '取消';
  delBtn.className = 'btn btn-ghost btn-sm';
  delBtn.onclick = function() { cancelEditStudent(id, oldName); };
  var inputEl = document.getElementById('stu-input-' + id);
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') saveEditStudent(id, oldName);
    if (e.key === 'Escape') cancelEditStudent(id, oldName);
  });
  inputEl.addEventListener('blur', function() {
    setTimeout(function() { saveEditStudent(id, oldName); }, 150);
  });
  inputEl.focus();
  inputEl.select();
}

function cancelEditStudent(id, oldName) {
  var cell = document.getElementById('stu-cell-' + id);
  var editBtn = document.getElementById('stu-edit-btn-' + id);
  var delBtn = document.getElementById('stu-del-btn-' + id);
  cell.innerHTML = '<span class="stu-name">' + esc(oldName) + '</span>';
  editBtn.textContent = '编辑';
  editBtn.onclick = function() { startEditStudent(id, oldName); };
  delBtn.textContent = '删除';
  delBtn.className = 'btn btn-danger-outline btn-sm';
  delBtn.onclick = function() { deleteStudent(id, oldName); };
}

function saveEditStudent(id, oldName) {
  var input = document.getElementById('stu-input-' + id);
  if (!input) return;
  var newName = input.value.trim();
  if (!newName) { showToast('姓名不能为空', 'error'); input.focus(); return; }
  if (newName === oldName) { cancelEditStudent(id, oldName); return; }
  var dup = currentStudents.some(function(s) { return s.id !== id && s.name === newName; });
  if (dup) { showToast('「' + newName + '」已在名单中', 'error'); input.focus(); input.select(); return; }
  BdwStudents.update(id, { name: newName });
  showToast('已更新：' + oldName + ' → ' + newName);
  var idx = currentStudents.findIndex(function(s) { return s.id === id; });
  if (idx !== -1) currentStudents[idx].name = newName;
  var cell = document.getElementById('stu-cell-' + id);
  if (cell) cell.innerHTML = '<span class="stu-name">' + esc(newName) + '</span>';
  var editBtn = document.getElementById('stu-edit-btn-' + id);
  var delBtn = document.getElementById('stu-del-btn-' + id);
  if (editBtn) { editBtn.disabled = false; editBtn.textContent = '编辑'; editBtn.onclick = function() { startEditStudent(id, newName); }; }
  if (delBtn) { delBtn.textContent = '删除'; delBtn.className = 'btn btn-danger-outline btn-sm'; delBtn.onclick = function() { deleteStudent(id, newName); }; }
  document.getElementById('studentCountLabel').textContent = '共 ' + currentStudents.length + ' 人';
}

function addStudent() {
  var nameInput = document.getElementById('newStuName');
  var name = nameInput.value.trim();
  if (!name) { showToast('请输入学生姓名', 'error'); nameInput.focus(); return; }
  BdwStudents.add(name, currentClassId);
  nameInput.value = '';
  nameInput.focus();
  showToast('已添加：' + name);
  loadStudents();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('pageStudents').classList.contains('active')) {
    if (document.activeElement === document.getElementById('newStuName')) addStudent();
  }
});

function deleteStudent(id, name) {
  showConfirm({
    icon: '👤',
    title: '移除学生「' + name + '」？',
    msg: '将从当前班级名单中删除，此操作不可恢复。',
    okText: '确认移除'
  }).then(function(ok) {
    if (!ok) return;
    BdwStudents.remove(id);
    showToast('已移除：' + name);
    loadStudents();
  });
}

// ====== IMPORT ======
function openImport() {
  document.getElementById('importText').value = '';
  openModal('modalImport');
}

function doImport() {
  var text = document.getElementById('importText').value;
  var rawNames = text.split(/[\n\r、,，;；\s]+/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0 && s.length <= 20; });
  if (rawNames.length === 0) { showToast('未识别到有效姓名', 'error'); return; }
  var existing = BdwStudents.getAll(currentClassId);
  var existingNames = new Set(existing.map(function(s) { return s.name; }));
  var toInsert = rawNames.filter(function(n) { return !existingNames.has(n); });
  if (toInsert.length === 0) {
    showToast('所有学生已存在，无需重复导入');
    closeModal('modalImport'); return;
  }
  var added = BdwStudents.addBatch(toInsert, currentClassId);
  closeModal('modalImport');
  showToast('成功导入 ' + added.length + ' 名学生' + (rawNames.length > toInsert.length ? '，跳过 ' + (rawNames.length - toInsert.length) + ' 个重名' : '') + ' 🎉');
  loadStudents();
}

// ====== MODAL ======
function openModal(id) {
  document.getElementById(id).classList.add('open');
  setTimeout(function() {
    var inp = document.getElementById(id).querySelector('input,textarea');
    if (inp) inp.focus();
  }, 50);
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// ====== CONFIRM DIALOG ======
function showConfirm(opts) {
  return new Promise(function(resolve) {
    document.getElementById('confirmIcon').textContent = opts.icon || '⚠️';
    document.getElementById('confirmTitle').textContent = opts.title;
    document.getElementById('confirmMsg').textContent = opts.msg;
    document.getElementById('confirmOkBtn').textContent = opts.okText || '确认';
    document.getElementById('confirmOverlay').classList.add('open');
    confirmResolve = function(result) {
      document.getElementById('confirmOverlay').classList.remove('open');
      resolve(result);
    };
  });
}

// ====== UTILS ======
function esc(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
function showToast(msg, type) {
  type = type || 'success';
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast toast-' + type + ' show';
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.classList.remove('show'); }, 2800);
}
</script>
<div style="text-align:center;padding:24px 0 16px;font-size:12px;color:var(--text-sub);opacity:0.4;letter-spacing:0.5px;position:relative;z-index:1">© Bridge CopyRight 2026</div>
</body>
</html>
