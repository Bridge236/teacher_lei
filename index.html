<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>别点我 - 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --g50:#f1f8e9;--g100:#e8f5e9;--g200:#c8e6c9;
  --g400:#66bb6a;--g500:#43a047;--g600:#388e3c;--g700:#2e7d32;
  --red:#ef5350;--gray:#6c757d;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#e8f5e9 0%,#f1f8e9 60%,#c8e6c9 100%);
  padding:20px;
}
body::before,body::after{
  content:'';position:fixed;border-radius:50%;pointer-events:none;
}
body::before{width:500px;height:500px;background:rgba(102,187,106,0.08);top:-150px;right:-100px}
body::after{width:350px;height:350px;background:rgba(165,214,167,0.1);bottom:-80px;left:-80px}

.card{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(20px);
  border-radius:28px;padding:52px 44px;
  box-shadow:0 24px 64px rgba(46,125,50,0.12),0 0 0 1px rgba(129,199,132,0.18);
  text-align:center;
}

.logo-wrap{margin-bottom:32px}
.logo-img{
  width:108px;height:108px;border-radius:26px;
  object-fit:cover;
  box-shadow:0 10px 32px rgba(46,125,50,0.18);
  margin-bottom:18px;
}
.site-name{
  font-size:30px;font-weight:800;color:var(--g700);
  letter-spacing:3px;margin-bottom:10px;
}
.slogan{
  font-size:14px;color:var(--g400);font-weight:500;
  line-height:1.5;
}

.form-group{margin-bottom:18px;text-align:left}
.form-group label{
  display:block;font-size:12px;font-weight:700;
  color:var(--g600);margin-bottom:7px;letter-spacing:.5px;text-transform:uppercase;
}
.form-group input{
  width:100%;padding:14px 16px;
  border:2px solid var(--g100);border-radius:13px;
  font-size:15px;background:var(--g50);
  outline:none;transition:all .25s;font-family:inherit;color:#333;
}
.form-group input:focus{
  border-color:var(--g400);background:#fff;
  box-shadow:0 0 0 4px rgba(102,187,106,0.12);
}
.form-group input::placeholder{color:#b2dfdb}

.err-msg{
  display:none;align-items:center;gap:6px;
  background:#ffebee;color:var(--red);
  border-radius:10px;padding:10px 14px;
  font-size:13px;margin-bottom:16px;text-align:left;
}
.err-msg.show{display:flex}

.btn-login{
  width:100%;padding:16px;margin-top:4px;
  background:linear-gradient(135deg,var(--g400),var(--g500));
  color:#fff;border:none;border-radius:14px;
  font-size:16px;font-weight:700;cursor:pointer;
  letter-spacing:2px;font-family:inherit;
  transition:all .25s;position:relative;overflow:hidden;
}
.btn-login:hover{
  background:linear-gradient(135deg,var(--g500),var(--g700));
  transform:translateY(-2px);
  box-shadow:0 10px 28px rgba(46,125,50,0.28);
}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-login .spinner{
  display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;margin:auto;
}
.btn-login.loading .btn-text{display:none}
.btn-login.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

.footer-note{font-size:12px;color:#a5d6a7;margin-top:24px}

@media(max-width:480px){.card{padding:40px 28px}}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="logo.png" alt="别点我" class="logo-img" onerror="this.style.display='none'">
    <div class="site-name">别 点 我</div>
    <div class="slogan">大喊一声别点我，下一个点到的就是你</div>
  </div>

  <form id="loginForm" onsubmit="return false">
    <div class="form-group">
      <label>账号（邮箱）</label>
      <div style="position:relative">
        <input type="email" id="email" placeholder="teacher@school.com" autocomplete="email" required style="padding-right:44px;width:100%" oninput="toggleClear()">
        <button type="button" id="clearBtn" onclick="clearEmail()"
          style="display:none;position:absolute;right:12px;top:50%;transform:translateY(-50%);
                 background:none;border:none;cursor:pointer;color:#90a4ae;
                 padding:4px;line-height:1;display:none;align-items:center" title="清空">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label>密码</label>
      <div style="position:relative">
        <input type="password" id="password" placeholder="········" autocomplete="current-password" required style="padding-right:44px;width:100%">
        <button type="button" onclick="togglePwd()" id="pwdToggle"
          style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                 background:none;border:none;cursor:pointer;color:#90a4ae;
                 padding:4px;line-height:1;display:flex;align-items:center" title="显示/隐藏密码">
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="err-msg" id="errMsg">
      <span>⚠</span><span id="errText">账号或密码错误，请重试</span>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span class="btn-text">登 录</span>
      <div class="spinner"></div>
    </button>
  </form>

  <div class="footer-note">仅限已授权教师使用 · 如需开通请联系管理员</div>
  <div style="font-size:11px;color:#a5d6a7;opacity:0.55;letter-spacing:0.5px;margin-top:10px">© Bridge CopyRight 2026</div>
</div>

<script>
// ===== 硬编码账号密码 =====
var VALID_ACCOUNTS = [
  { email: '981020530@qq.com', password: '123456' },
  { email: '123456@163.com',   password: '123456' }
];

function clearEmail() {
  var input = document.getElementById('email');
  input.value = '';
  input.focus();
  document.getElementById('clearBtn').style.display = 'none';
}
function toggleClear() {
  var btn = document.getElementById('clearBtn');
  btn.style.display = document.getElementById('email').value ? 'flex' : 'none';
}
function togglePwd() {
  var input = document.getElementById('password');
  var icon = document.getElementById('eyeIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// 检查是否已登录
(function() {
  if (localStorage.getItem('bdw_logged_in') === 'true') {
    location.href = 'roll.html';
  }
})();

function doLogin() {
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('errMsg');

  if (!email || !password) {
    showErr('请输入账号和密码');
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;
  err.classList.remove('show');

  setTimeout(function() {
    var matched = VALID_ACCOUNTS.some(function(a) { return a.email === email && a.password === password; });
    if (!matched) {
      btn.classList.remove('loading');
      btn.disabled = false;
      showErr('账号或密码错误，请重试');
      return;
    }

    localStorage.setItem('bdw_logged_in', 'true');
    localStorage.setItem('bdw_user_email', email);
    location.href = 'roll.html';
  }, 400);
}

function showErr(msg) {
  document.getElementById('errText').textContent = msg;
  document.getElementById('errMsg').classList.add('show');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
